name: object_detection
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 YOLO (for your model)
  ultralytics_yolo: ^0.2.0

  # 🔊 Text to Speech
  flutter_tts: ^4.2.3

  # 🔔 Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # 📍 Location + Permissions
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # 🌍 Networking
  http: ^1.5.0
  dio: ^5.4.0

  # 🗺️ Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # 📦 Storage / Utils
  shared_preferences: ^2.3.3
  path_provider: ^2.1.2

  # 🔗 Misc
  url_launcher: ^6.3.2
  html: ^0.15.6
  vibration: ^3.1.3
  flutter_compass: ^0.8.0


dependency_overrides:
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/DarkSimplifiedEagleIcon.png
    - assets/images/PrimaryLogoOnYellowBackground.png
    - assets/data/buildings.json
    - assets/images/
    - assets/models/
    #- assets/data/landmarks.geojson
